name: Image Build

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build-database:
    name: Build Documentation Database
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Build database using amd64 builder
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
      with:
        context: .
        platforms: linux/amd64
        target: db-builder
        outputs: type=local,dest=./build-output
        cache-from: type=gha,scope=db-builder
        cache-to: type=gha,mode=max,scope=db-builder
        secrets: |
          github_token=${{ secrets.GITHUB_TOKEN }}

    - name: Upload database artifact
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: prebuilt-database
        path: ./build-output/app/.cache
        retention-days: 1
        overwrite: true
        include-hidden-files: true

  build:
    name: Build Multi-Platform Docker Image
    runs-on: ubuntu-latest
    needs: build-database
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Download database artifact
      uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
      with:
        name: prebuilt-database
        path: ./prebuilt-data

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Build multi-platform Docker image with pre-built database
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
      with:
        context: .
        build-contexts: |
          prebuilt-data=./prebuilt-data
        target: runner-prebuilt
        platforms: linux/amd64,linux/arm64
        push: false
        cache-from: type=gha,scope=multi-platform
        cache-to: type=gha,mode=max,scope=multi-platform
        tags: mcp-optimizer:latest
